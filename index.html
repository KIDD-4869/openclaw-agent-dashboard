<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 监控面板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f23;
      color: #c8c8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部统计栏 ── */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e8e8ff;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e8e8ff;
      font-variant-numeric: tabular-nums;
    }

    .stat-card.time .stat-value { font-size: 1rem; }

    .stat-sub {
      font-size: 0.68rem;
      color: #6666aa;
      margin-top: 4px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 主体左右分栏 ── */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左侧列表 ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .group-header {
      font-size: 0.72rem;
      font-weight: 700;
      color: #6666aa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 16px 6px;
      position: sticky;
      top: 0;
      background: #0f0f23;
      z-index: 1;
    }

    .group-header .count {
      font-weight: 400;
      color: #44445a;
      margin-left: 4px;
    }

    .session-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transiti background 0.15s, border-color 0.15s;
      gap: 10px;
    }

    .session-item:hover {
      background: rgba(255,255,255,0.04);
    }

    .session-item.selected {
      background: rgba(0,255,136,0.06);
      border-left-color: #00ff88;
    }

    .item-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .item-dot.on {
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px #00ff88; }
      50% { box-shapx #00ff88, 0 0 20px rgba(0,255,136,0.3); }
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e0e0f8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .item-model {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      letter-spacing: 0.03em;
    }

    .item-model.opus {
      background: rgba(160,80,255,0.2);
      color: #c084fc;
      border: 1px solid rgba(160,80,255,0.3);
    }

    .item-model.sonnet {
      background: rgba(60,130,255,0.2);
      color: #7eb8ff;
      border: 1px solid rgba(60,130,255,0.3);
    }

    .item-model.other {
      background: rgba(100,100,140,0.2);
      color: #9999bb;
      border: 1px solid rgba(100,100,140,0.3);
    }

    .item-time {
      font-size: 0.65rem;
      color: #555577;
    }

    /* ── 右侧详情面板 ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-track { background: transparent; }
    .detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #44445a;
      font-size: 0.9rem;
    }

    .detail-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .detail-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e8e8ff;
      margin-bottom: 10px;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-tag {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #9999bb;
    }

    .detail-tag.model {
      font-weight: 600;
    }

    .detail-tag.model.opus {
      background: rgba(160,80,255,0.15);
      color: #c084fc;
      border-color: rgba(160,80,255,0.3);
    }

    .detail-tag.model.sonnet {
      background: rgba(60,130,255,0.15);
      color: #7eb8ff;
      border-color: rgba(60,130,255,0.3);
    }

    /* Token 详情 */
    .token-detail {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .token-box {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .token-box-label {
      font-size: 0.68rem;
      color: #6666aa;
      margin-bottom: 4px;
    }

    .token-box-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e0f8;
      font-variant-numeric: tabular-nums;
    }

    .token-box-value.used { color: #00cc66; }

    .progress-wrap {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .progress-bar.low  { background: #00cc66; }
    .progress-bar.mid  { background: #f0c040; }
    .progress-bar.high { background: #ff5555; }

    /* Sub-agent 任务表 */
    .subagent-section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #8888aa;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .task-table {
      width: 100%;
      border-collapse: collapse;
    }

    .task-table th {
      font-size: 0.65rem;
      font-weight: 600;
      color: #555577;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .task-table td {
      font-size: 0.78rem;
      color: #c8c8e8;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .task-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .task-status.active { color: #00ff88; }
    .task-status.done { color: #6666aa; }

    .task-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .task-status.active .task-status-dot {
      background: #00ff88;
      box-shadow: 0 0 4px #00ff88;
      animation: pulse 2s ease-in-out infinite;
    }

    .task-status.done .task-status-dot {
      background: #555577;
    }

    .task-desc {
      font-size: 0.7rem;
      color: #7777aa;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }

    /* 最近消息 */
    .messages-section {
      margin-bottom: 16px;
    }

    .msg-line {
      font-size: 0.78rem;
      color: #8888aa;
      line-height: 1.6;
      padding: 4px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .msg-role {
      font-weight: 600;
      margin-right: 6px;
    }

    .msg-role.user { color: #5599ff; }
    .msg-role.assistant { color: #aa77ff; }

    .empty-hint {
      color: #44445a;
      font-size: 0.82rem;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>&#127963;&#65039; Agent 监控面板</h1>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">总会话数</div>
        <div class="stat-value" id="stat-total">&mdash;</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">活跃会话</div>
        <div class="stat-value" id="stat-active">&mdash;</div>
        <div class="stat-sub" id="stat-active-names"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">总 Token 消耗</div>
        <div class="stat-value" id="stat-tokens">&mdash;</div>
      </div>
      <div class="stat-card time">
        <div class="stat-label">当前时间</div>
        <div class="stat-value" id="stat-time">&mdash;</div>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="sidebar" id="sidebar"></div>
    <div class="detail-panel" id="detail">
      <div class="detail-empty">← 选择一个会话查看详情</div>
    </div>
  </div>

  <script>
    var API_BASE = "http://localhost:3001";
    var REFRESH_INTERVAL = 30000;
    var selectedKey = null;
    var allSessions = [];

    function fmtTokens(n) {
      if (!n && n !== 0) return "0";
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
      if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
      return String(n);
    }

    function relativeTime(ts) {
      var diff = Date.now() - ts;
      var sec  = Math.floor(diff / 1000);
      if (sec < 10)  return "\u521a\u521a";
      if (sec < 60)  return sec + "\u79d2\u524d";
      var min = Math.floor(sec / 60);
      if (min < 60)  return min + "\u5206\u949f\u524d";
      var hr = Math.floor(min / 60);
      if (hr < 24)   return hr + "\u5c0f\u65f6\u524d";
      return Math.floor(hr / 24) + "\u5929\u524d";
    }

    function isActive(ts) {
      return (Date.now() - ts) < 3600 * 1000;
    }

    function modelClass(model) {
      if (!model) return "other";
      var m = model.toLowerCase();
      if (m.indexOf("opus") !== -1)   return "opus";
      if (m.indexOf("sonnet") !== -1) return "sonnet";
      return "other";
    }

    function progressClass(pct) {
      if (pct < 30) return "low";
      if (pct < 70) return "mid";
      return "high";
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function groupLabel(kind) {
      var map = { main: "\ud83c\udfe3 \u4e3b\u4f1a\u8bdd", cron: "\u23f0 \u5b9a\u65f6\u4efb\u52a1", group: "\ud83d\udcac \u7fa4\u804a", subagent: "\ud83e\udd16 Sub-agent" };
      return map[kind] || kind;
    }

    // ── 渲染左侧列表 ──
    function renderSidebar(sessions) {
      var sidebar = document.getElementById("sidebar");
      var groups = { main: [], cron: [], group: [], subagent: [] };
      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i];
        var k = groups[s.kind] ? s.kind : "main";
        groups[k].push(s);
      }

      var html = "";
      var order = ["main", "cron", "group", "subagent"];
      for (var g = 0; g < order.length; g++) {
        var kind = order[g];
        var list = groups[kind];
        if (list.length === 0) continue;

        html += '<div class="group-header">' + groupLabel(kind) + ' <span class="count">(' + list.length + ')</span></div>';
        for (var j = 0; j < list.length; j++) {
          var s = list[j];
          var active = isActive(s.updatedAt);
          var sel = s.key === selectedKey ? " selected" : "";
          html += '<div class="session-item' + sel + '" data-key="' + escHtml(s.key) + '">'
            + '<span class="item-dot' + (active ? " on" : "") + '"></span>'
            + '<div class="item-info">'
            +   '<div class="item-name" title="' + escHtml(s.key) + '">' + escHtml(s.label || s.key) + '</div>'
            +   '<div class="item-meta">'
            +     '<span class="item-model ' + modelClass(s.model) + '">' + escHtml(s.model || "") + '</span>'
            +     '<span class="item-time">' + relativeTime(s.updatedAt) + '</span>'
            +   '</div>'
            + '</div>'
            + '</div>';
        }
      }

      sidebar.innerHTML = html;

      // 绑定点击
      var items = sidebar.querySelectorAll(".session-item");
      for (var i = 0; i < items.length; i++) {
        items[i].addEventListener("click", function() {
          selectedKey = this.getAttribute("data-key");
          // 更新选中样式
          var all = sidebar.querySelectorAll(".session-item");
          for (var x = 0; x < all.length; x++) all[x].classList.remove("selected");
          this.classList.add("selected");
          renderDetail();
        });
      }
    }

    // ── 渲染右侧详情 ──
    function renderDetail() {
      var panel = document.getElementById("detail");
      if (!selectedKey) {
        panel.innerHTML = '<div class="detail-empty">\u2190 \u9009\u62e9\u4e00\u4e2a\u4f1a\u8bdd\u67e5\u770b\u8be6\u60c5</div>';
        return;
      }

      var s = null;
      for (var i = 0; i < allSessions.length; i++) {
        if (allSessions[i].key === selectedKey) { s = allSessions[i]; break; }
      }
      if (!s) {
        panel.innerHTML = '<div class="detail-empty">\u4f1a\u8bdd\u5df2\u4e0d\u5b58\u5728</div>';
        return;
      }

      var pct = s.contextTokens ? Math.min(100, Math.round(s.totalTokens / s.contextTokens * 100)) : 0;
      var usedTokens = s.usedTokens || ((s.inputTokens || 0) + (s.outputTokens || 0));

      var html = '<div class="detail-header">'
        + '<div class="detail-title">' + escHtml(s.label || s.key) + '</div>'
        + '<div class="detail-tags">'
        +   '<span class="detail-tag model ' + modelClass(s.model) + '">' + escHtml(s.model || "unknown") + '</span>'
        +   '<span class="detail-tag">' + escHtml(s.channel || "unknown") + '</span>'
        +   (s.agentId ? '<span class="detail-tag">agent: ' + escHtml(s.agentId) + '</span>' : '')
        +   '<span class="detail-tag">key: ' + escHtml(s.key) + '</span>'
        + '</div>'
        + '</div>';

      // Token 详情
      html += '<div class="token-detail">'
        + '<div class="token-box">'
        +   '<div class="token-box-label">Input Tokens</div>'
        +   '<div class="token-box-value">' + fmtTokens(s.inputTokens || 0) + '</div>'
        + '</div>'
        + '<div class="token-box">'
        +   '<div class="token-box-label">Output Tokens</div>'
        +   '<div class="token-box-value">' + fmtTokens(s.outputTokens || 0) + '</div>'
        + '</div>'
        + '<div class="token-box">'
        +   '<div class="token-box-label">Used (In+Out)</div>'
        +   '<div class="token-box-value used">' + fmtTokens(usedTokens) + '</div>'
        + '</div>'
        + '<div class="token-box">'
        +   '<div class="token-box-label">\u4e0a\u4e0b\u6587\u7a97\u53e3 (' + pct + '%)</div>'
        +   '<div class="token-box-value">' + fmtTokens(s.totalTokens || 0) + ' / ' + fmtTokens(s.contextTokens || 200000) + '</div>'
        +   '<div class="progress-wrap"><div class="progress-bar ' + progressClass(pct) + '" style="width:' + pct + '%"></div></div>'
        + '</div>'
        + '</div>';

      // Sub-agent 任务列表
      if (s.subagentTasks && s.subagentTasks.length > 0) {
        html += '<div class="subagent-section">'
          + '<div class="section-label">Sub-agent \u4efb\u52a1 (' + s.subagentTasks.length + ')</div>'
          + '<table class="task-table"><thead><tr>'
          + '<th>Agent</th><th>Task ID</th><th>\u72b6\u6001</th><th>Token</th><th>\u66f4\u65b0\u65f6\u95f4</th>'
          + '</tr></thead><tbody>';

        for (var t = 0; t < s.subagentTasks.length; t++) {
          var task = s.subagentTasks[t];
          var statusCls = task.isActive ? "active" : "done";
          var statusText = task.isActive ? "\u6d3b\u8dc3" : "\u5b8c\u6210";
          var desc = "";
          if (task.recentMessages && task.recentMessages.length > 0) {
            desc = task.recentMessages[0].text || "";
          }
          html += '<tr>'
            + '<td>' + escHtml(task.agentName) + '</td>'
            + '<td style="font-family:monospace;font-size:0.72rem;color:#7777aa">' + escHtml(task.taskId) + '</td>'
            + '<td><span class="task-status ' + statusCls + '"><span class="task-status-dot"></span>' + statusText + '</span></td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtTokens(task.usedTokens || 0) + '</td>'
            + '<td style="color:#555577;font-size:0.72rem">' + relativeTime(task.updatedAt) + '</td>'
            + '</tr>';
          if (desc) {
            html += '<tr><td colspan="5"><div class="task-desc">\ud83d\udcdd ' + escHtml(desc) + '</div></td></tr>';
          }
        }
        html += '</tbody></table></div>';
      }

      // 最近消息
      html += '<div class="messages-section">'
        + '<div class="section-label">\u6700\u8fd1\u6d88\u606f</div>';
   if (s.recentMessages && s.recentMessages.length > 0) {
        for (var m = 0; m < s.recentMessages.length; m++) {
          var msg = s.recentMessages[m];
          var icon = msg.role === "user" ? "\ud83d\udc64" : "\ud83e\udd16";
          html += '<div class="msg-line">'
            + '<span class="msg-role ' + msg.role + '">' + icon + '</span>'
            + escHtml(msg.text)
            + '</div>';
        }
      } else {
        html += '<div class="empty-hint">\u6682\u65e0\u6d88\u606f\u8bb0\u5f55</div>';
      }
      html += '</div>';

      panel.innerHTML ml;
    }

    // ── 统计栏 ──
    function updateStats(sessions) {
      document.getElementById("stat-total").textContent = sessions.length;

      var activeSessions = sessions.filter(function(s) { return isActive(s.updatedAt); });
      document.getElementById("stat-active").textContent = activeSessions.length;

      // 活跃会话名字列表
      var names = activeSessions.map(function(s) { return s.label || s.key; });
      document.getElementById("stat-active-names").textContent = names.join(", ");
      document.getElementById("stat-active-names").title = names.join(", ");

      // Token 消耗用 usedTokens
      var totalUsed = sessions.reduce(function(a, s) {
        return a + (s.usedTokens || ((s.inputTokens || 0) + (s.outputTokens || 0)));
      }, 0);
      document.getElementById("stat-tokens").textContent = fmtTokens(totalUsed);
    }

    function updateClock() {
      document.getElementById("stat-time").textContent =
        new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function render(sessions) {
      allSessions = sessions;
      updateStats(sessions);
      renderSidebar(sessions);
      renderDetail();
      updateClock();
    }

    function fetchAndRender() {
      fetch(API_BASE + "/api/sessions")
        .then(function(r) { return r.json(); })
        .then(function(data) { render(data.sessions || []); })
        .catch(function(e) {
          console.error("Failed to fetch sessions:", e);
          if (window.MOCK_SESSIONS) render(window.MOCK_SESSIONS);
        });
    }

    fetchAndRender();
    setInterval(fetchAndRender, REFRESH_INTERVAL);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
